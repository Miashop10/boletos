<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor de Boletos — Miashop</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.0/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  :root{
    --bg:#eef2f7;
    --bg-grad:radial-gradient(1100px 560px at 85% -12%,#dcefe6 0%,transparent 60%),radial-gradient(900px 500px at -8% 108%,#e3ebf6 0%,transparent 55%);
    --panel:#ffffff;
    --panel-2:#f5f8fb;
    --line:#dde4ec;
    --line-soft:#e7edf3;
    --ink:#1d2733;
    --muted:#69788a;
    --muted-2:#94a3b4;
    --accent:#12a06a;
    --accent-deep:#0e8a5a;
    --accent-soft:#e6f6ee;
    --brand:#ef7e22;
    --brand-soft:#fdeede;
    --accent-ink:#ffffff;
    --danger:#e0524f;
    --warn-bg:#fff8e8;
    --warn-line:#f0d79a;
    --warn-ink:#9a7008;
    --radius:16px;
    --mono:"SFMono-Regular",ui-monospace,"Menlo","Consolas",monospace;
    --sans:"Inter","Segoe UI",system-ui,-apple-system,sans-serif;
    --shadow:0 10px 30px rgba(31,49,74,.08);
    --shadow-sm:0 2px 8px rgba(31,49,74,.06);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;font-family:var(--sans);color:var(--ink);line-height:1.5;
    background:var(--bg);background-image:var(--bg-grad);background-attachment:fixed;
    -webkit-font-smoothing:antialiased;
  }
  body::before{content:"";position:fixed;top:0;left:0;right:0;height:4px;
    background:linear-gradient(90deg,var(--brand),#f5a25a,var(--accent));z-index:100}
  .wrap{max-width:1080px;margin:0 auto;padding:40px 22px 90px}
  header{display:flex;align-items:center;gap:16px;margin-bottom:28px;flex-wrap:wrap}
  .brand{height:42px;display:block}
  .divider{width:1px;height:34px;background:var(--line)}
  .htitle{display:flex;flex-direction:column;line-height:1.15}
  h1{font-size:22px;margin:0;letter-spacing:-.4px;font-weight:700}
  .htitle small{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.2px}
  .tag{font-size:11px;color:#fff;background:var(--brand);
    padding:4px 11px;border-radius:99px;font-weight:700;letter-spacing:.3px;margin-left:auto}
  .sub{color:var(--muted);font-size:14px;margin:14px 0 28px;max-width:660px}

  .drop{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:230px;border:2px dashed var(--line);border-radius:20px;
    background:var(--panel);padding:40px 24px;text-align:center;cursor:pointer;
    transition:.2s;box-shadow:var(--shadow-sm);
  }
  .drop:hover{border-color:var(--accent);background:var(--panel-2)}
  .drop.over{border-color:var(--accent);background:var(--accent-soft);transform:scale(1.004)}
  .drop .icon{width:60px;height:60px;margin-bottom:16px;border-radius:16px;display:grid;place-items:center;
    background:var(--accent-soft);font-size:28px}
  .drop strong{color:var(--ink);font-weight:600;font-size:17px}
  .drop .hint{color:var(--muted);font-size:13.5px;display:block;margin-top:7px}
  .drop .formats{color:var(--muted-2);font-size:12px;display:block;margin-top:14px;
    border:1px solid var(--line);padding:4px 12px;border-radius:99px}
  input[type=file]{display:none}
  .spinner{display:none;flex-direction:column;align-items:center;gap:8px;color:var(--muted);font-size:13.5px;margin-top:16px}
  .spinner.on{display:flex}
  .spinner .row{display:flex;align-items:center;gap:10px}
  .spinner i{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--accent);
    border-radius:50%;animation:spin .7s linear infinite}
  .spinner .prog{font-size:12px;color:var(--muted-2)}
  @keyframes spin{to{transform:rotate(360deg)}}

  .bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:26px 0 18px}
  .summary{margin-right:auto;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .stat{display:flex;flex-direction:column;line-height:1.2;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;padding:8px 16px;box-shadow:var(--shadow-sm)}
  .stat b{font-size:18px;font-weight:700}
  .stat span{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .stat.total b{color:var(--accent)}
  button{
    font-family:var(--sans);font-size:13.5px;font-weight:600;cursor:pointer;
    border:1px solid var(--line);background:var(--panel);color:var(--ink);
    padding:9px 15px;border-radius:11px;transition:.15s;display:inline-flex;align-items:center;gap:7px;
    box-shadow:var(--shadow-sm);
  }
  button:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
  button:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
  button.ghost-danger{color:var(--danger);background:transparent;border-color:transparent;box-shadow:none}
  button.ghost-danger:hover:not(:disabled){border-color:var(--danger);background:#fdeceb;color:var(--danger)}

  .list{display:flex;flex-direction:column;gap:12px}
  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 20px;transition:.18s;animation:rise .25s ease;box-shadow:var(--shadow-sm);
  }
  .card:hover{box-shadow:var(--shadow)}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .card.flag{border-color:var(--warn-line);background:var(--warn-bg)}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
  .nome{font-weight:700;font-size:16.5px;letter-spacing:-.2px}
  .file{font-size:12px;color:var(--muted-2);margin-top:2px;display:flex;align-items:center;gap:6px}
  .src{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;
    padding:1px 7px;border-radius:99px;background:var(--accent-soft);color:var(--accent-deep)}
  .src.foto{background:#eaf1fc;color:#3267c9}
  .x{flex:none;width:32px;height:32px;padding:0;justify-content:center;color:var(--muted);
    background:transparent;border-color:transparent;font-size:17px;border-radius:9px;box-shadow:none}
  .x:hover{color:var(--danger);background:#fdeceb;border-color:transparent}
  .fields{display:flex;gap:30px;flex-wrap:wrap;margin:14px 0 16px}
  .field label{display:block;font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
  .field .v{font-weight:600;font-size:15px}
  .field.valor .v{color:var(--accent);font-size:17px}
  .vc{display:flex;gap:10px;align-items:stretch}
  .barcode{
    font-family:var(--mono);font-size:13px;letter-spacing:.2px;
    background:var(--panel-2);border:1px solid var(--line-soft);border-radius:10px;
    padding:11px 14px;flex:1;overflow-x:auto;white-space:nowrap;display:flex;align-items:center;color:#34414f;
  }
  .barcode.empty{color:var(--danger);font-family:var(--sans)}
  .copybtn{white-space:nowrap;min-width:128px;justify-content:center;
    background:var(--accent);border-color:var(--accent);color:#fff}
  .copybtn:hover:not(:disabled){background:var(--accent-deep);border-color:var(--accent-deep);color:#fff}
  .copybtn.ok{background:var(--accent-deep);border-color:var(--accent-deep);color:#fff}
  .flagmsg{display:flex;align-items:center;gap:7px;color:var(--warn-ink);font-size:12.5px;margin-top:12px}
  .empty{text-align:center;color:var(--muted);padding:48px 20px;font-size:14px;
    border:1px dashed var(--line);border-radius:var(--radius);background:var(--panel)}
  .empty .big{font-size:30px;display:block;margin-bottom:10px;opacity:.6}
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(10px);
    background:var(--ink);border:1px solid rgba(255,255,255,.08);color:#fff;
    padding:12px 22px;border-radius:12px;font-size:14px;font-weight:500;
    opacity:0;pointer-events:none;transition:.25s;z-index:50;box-shadow:var(--shadow);max-width:90%;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.warn{background:#8a5a00}
  @media(max-width:600px){
    .wrap{padding:28px 16px 80px}
    .fields{gap:18px}
    .vc{flex-direction:column}
    .copybtn{min-width:0}
  }
</style>
</head>

const drop=$("drop"),fileInput=$("file"),list=$("list"),spinner=$("spinner"),spinTxt=$("spinTxt"),spinProg=$("spinProg");

function toast(msg,warn){
  const t=$("toast");t.textContent=msg;t.classList.toggle("warn",!!warn);t.classList.add("show");
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2600);
}

drop.addEventListener("click",()=>fileInput.click());
["dragenter","dragover"].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add("over");}));
["dragleave","drop"].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.remove("over");}));
drop.addEventListener("drop",ev=>handleFiles(ev.dataTransfer.files));
fileInput.addEventListener("change",ev=>{handleFiles(ev.target.files);ev.target.value="";});

const isPdf=f=>f.type==="application/pdf"||f.name.toLowerCase().endsWith(".pdf");
const isImg=f=>f.type.startsWith("image/")||/\.(jpe?g|png|webp|bmp)$/i.test(f.name);

async function handleFiles(files){
  const ok=[...files].filter(f=>isPdf(f)||isImg(f));
  if(!ok.length){toast("Selecione arquivos PDF ou imagens");return;}
  spinner.classList.add("on");
  let dups=0,add=0,n=0;
  for(const f of ok){
    n++; spinTxt.textContent=`Lendo boleto ${n} de ${ok.length}…`; spinProg.textContent=f.name;
    let b;
    try{ b = isImg(f) ? await readImagem(f) : await readPdf(f); }
    catch(err){ console.error(err); b={nome:"(não reconhecido)",barras:"",venc:"",valor:"",arquivo:f.name,origem:isImg(f)?"foto":"pdf",erro:true}; }
    const chave=barrasLimpa(b.barras);
    if(chave && boletos.some(x=>barrasLimpa(x.barras)===chave)){dups++;continue;}
    boletos.push(b);add++;
  }
  spinner.classList.remove("on");spinProg.textContent="";
  render();
  if(dups>0&&add===0) toast(dups===1?"Boleto duplicado — não foi importado":`${dups} boletos duplicados — nenhum importado`,true);
  else if(dups>0) toast(`${add} importado(s) · ${dups} duplicado(s) ignorado(s)`,true);
}

/* ---------- PDF ---------- */
async function pdfText(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let txt="";
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const c=await page.getTextContent();
    txt+=c.items.map(i=>i.str).join(" ")+" ";
  }
  return txt.replace(/\s+/g," ").trim();
}
async function readPdf(file){
  const txt=await pdfText(file);
  return montar(txt,file.name,"pdf");
}

/* ---------- Imagem (OCR) ---------- */
let _worker=null;
async function getWorker(){
  if(_worker) return _worker;
  spinTxt.textContent="Preparando leitor de imagem…";
  _worker=await Tesseract.createWorker("por",1,{
    logger:m=>{ if(m.status==="recognizing text") spinProg.textContent="reconhecendo "+Math.round(m.progress*100)+"%"; }
  });
  return _worker;
}
async function preprocess(file){
  // aumenta a imagem e converte para tons de cinza com contraste, melhora o OCR
  const img=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=URL.createObjectURL(file);});
  const maxW=2000;
  const scale=img.width>maxW?maxW/img.width:1.6;
  const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
  const cv=document.createElement("canvas");cv.width=w;cv.height=h;
  const ctx=cv.getContext("2d");
  ctx.drawImage(img,0,0,w,h);
  const d=ctx.getImageData(0,0,w,h),px=d.data;
  for(let i=0;i<px.length;i+=4){
    let g=0.299*px[i]+0.587*px[i+1]+0.114*px[i+2];
    g=(g-128)*1.4+128;                // contraste
    g=g<150?Math.max(0,g-30):Math.min(255,g+25); // realça texto
    px[i]=px[i+1]=px[i+2]=g;
  }
  ctx.putImageData(d,0,0);
  return cv;
}
async function readImagem(file){
  const canvas=await preprocess(file);
  const worker=await getWorker();
  const {data}=await worker.recognize(canvas);
  const txt=(data.text||"").replace(/\s+/g," ").trim();
  return montar(txt,file.name,"foto");
}

/* ---------- Linha digitável ---------- */
function mod10(num){
  let soma=0,mult=2;
  for(let i=num.length-1;i>=0;i--){let r=parseInt(num[i],10)*mult;if(r>9)r=Math.floor(r/10)+(r%10);soma+=r;mult=mult===2?1:2;}
  const resto=soma%10;return resto===0?0:10-resto;
}
function validaLinha47(d){
  if(d.length!==47) return false;
  const c1=d.substr(0,9),c2=d.substr(10,10),c3=d.substr(21,10);
  return mod10(c1.slice(0,8))==+c1[8] && mod10(c2.slice(0,9))==+c2[9] && mod10(c3.slice(0,9))==+c3[9];
}
function parseLinha47(d){
  if(d.length!==47) return null;
  const campo5=d.substr(33,14);
  return {fatorVenc:campo5.substr(0,4),valor:campo5.substr(4,10)};
}
function fatorParaData(fator){
  const f=parseInt(fator,10);if(!f)return"";
  // base antiga 07/10/1997; ao atingir 9999 (21/02/2025) o fator reiniciou em 1000 na base 22/02/2025
  let dt=new Date(Date.UTC(1997,9,7));dt.setUTCDate(dt.getUTCDate()+f);
  if(dt.getUTCFullYear()<2025){dt=new Date(Date.UTC(2025,1,22));dt.setUTCDate(dt.getUTCDate()+(f-1000));}
  return `${String(dt.getUTCDate()).padStart(2,"0")}/${String(dt.getUTCMonth()+1).padStart(2,"0")}/${dt.getUTCFullYear()}`;
}
function centavosReais(v){return (parseInt(v,10)/100).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtLinha(d){return `${d.substr(0,5)}.${d.substr(5,5)} ${d.substr(10,5)}.${d.substr(15,6)} ${d.substr(21,5)}.${d.substr(26,6)} ${d.substr(32,1)} ${d.substr(33,14)}`;}

/* ---------- Beneficiário ---------- */
function extrairBeneficiario(txt){
  // O beneficiário fica sempre ao lado/abaixo da palavra "Beneficiário".
  // Estratégia: para cada ocorrência de "Beneficiário" (não "Beneficiário final"),
  // pula os rótulos de cabeçalho grudados e captura o maior bloco de nome real
  // que aparece logo depois, parando ao encontrar números ou CNPJ.
  const LABELS=["beneficiario","beneficiário","nome","agencia","agência","codigo","código","cedente","especie","espécie","referencia","referência","nosso","numero","número","documento","cnpj","cpf","do","da","de","local","pagamento","vencimento","pagador","data","valor","processamento","uso","banco","carteira","sacado","emitido"];
  const ehLabel=t=>{const c=t.toLowerCase().replace(/[^a-zà-ú\/]/g,"");return LABELS.includes(c)||c==="/"||c===""||c==="-";};

  txt=txt.replace(/\bS\s*\/\s*A\b/gi,"S/A"); // mantém "S/A" junto ao nome

  const re=/Benefici[áa]rio(?!\s+final)/gi;
  let m,melhor=null;
  while((m=re.exec(txt))){
    const toks=txt.slice(m.index+m[0].length).trim().split(/\s+/);
    const blocos=[]; let atual=[];
    for(const t of toks){
      const temNum=/\d{2}\.?\d{3}\.?\d{3}\/\d{4}/.test(t)||/^\d{3,}$/.test(t);
      if(temNum){ if(atual.length)blocos.push(atual.slice()); break; }
      if(ehLabel(t)){ if(atual.length){blocos.push(atual.slice());atual=[];} continue; }
      atual.push(t);
      if(blocos.length===0 && atual.length>16) break;
    }
    if(atual.length)blocos.push(atual);
    const cand=blocos.filter(b=>b.join("").replace(/[^A-Za-zÀ-Ú]/g,"").length>=4)
                     .sort((a,b)=>b.join(" ").length-a.join(" ").length)[0];
    if(cand){
      const s=cand.join(" ").replace(/^[-\/.\s]+|[-\/.\s]+$/g,"").trim();
      if(s.length>=4 && (!melhor||s.length>melhor.length)) melhor=s;
    }
  }
  return melhor||"(beneficiário não identificado)";
}

/* ---------- Montagem comum ---------- */
function montar(txt,arquivo,origem){
  let barras="",venc="",valor="",d47="";

  // linha digitável formatada (5.5 5.6 5.6 1 14)
  let m=txt.match(/(\d{5})[.\s]?(\d{5})\s+(\d{5})[.\s]?(\d{6})\s+(\d{5})[.\s]?(\d{6})\s+(\d)\s+(\d{14})/);
  if(m){ d47=m.slice(1).join(""); }
  if(!d47 || !validaLinha47(d47)){
    // procura qualquer sequência de 47 dígitos no texto "limpo"
    const limpo=txt.replace(/[^\d]/g," ");
    const cands=limpo.match(/(?:\d[ ]?){47,}/g)||[];
    for(const c of cands){
      const only=c.replace(/\D/g,"");
      for(let i=0;i+47<=only.length;i++){
        const slice=only.substr(i,47);
        if(validaLinha47(slice)){ d47=slice; break; }
      }
      if(d47) break;
    }
  }
  if(d47){
    barras=fmtLinha(d47);
    const p=parseLinha47(d47);
    if(p){venc=fatorParaData(p.fatorVenc);valor=centavosReais(p.valor);}
  } else if(m){
    // não passou no dígito verificador (OCR impreciso) mas mostra o que leu
    d47=m.slice(1).join(""); barras=fmtLinha(d47);
    const p=parseLinha47(d47);
    if(p){venc=fatorParaData(p.fatorVenc);valor=centavosReais(p.valor);}
  }

  if(!venc){const vm=txt.match(/Vencimento[:\s]+(\d{2}\/\d{2}\/\d{4})/i);if(vm)venc=vm[1];}
  if(!valor){const vm=txt.match(/Valor (?:do )?Documento[\s\S]{0,40}?R?\$?\s*([\d.]+,\d{2})/i);if(vm)valor=vm[1];}

  const nome=extrairBeneficiario(txt);
  const linhaOk=d47&&validaLinha47(d47);
  const erro=!barras||!venc||!valor||nome.startsWith("(")||(origem==="foto"&&!linhaOk);
  return {nome,barras,venc,valor,arquivo,origem,erro};
}

const barrasLimpa=b=>(b||"").replace(/\D/g,"");

function render(){
  if(!boletos.length){
    list.innerHTML='<div class="empty"><span class="big">🧾</span>Nenhum boleto importado ainda.<br>Arraste seus PDFs ou fotos para começar.</div>';
  } else {
    list.innerHTML=boletos.map((b,i)=>`
      <div class="card ${b.erro?"flag":""}">
        <div class="card-top">
          <div>
            <div class="nome">${esc(b.nome)}</div>
            <div class="file"><span class="src ${b.origem==="foto"?"foto":""}">${b.origem==="foto"?"foto":"pdf"}</span>${esc(b.arquivo||"")}</div>
          </div>
          <button class="x" title="Apagar" onclick="del(${i})">✕</button>
        </div>
        <div class="fields">
          <div class="field"><label>Vencimento</label><div class="v">${b.venc||"—"}</div></div>
          <div class="field valor"><label>Valor</label><div class="v">R$ ${b.valor||"—"}</div></div>
        </div>
        <div class="vc">
          <div class="barcode ${b.barras?"":"empty"}">${b.barras||"código de barras não encontrado"}</div>
          <button class="copybtn" onclick="copiar(${i},this)" ${b.barras?"":"disabled"}>⧉ Copiar código</button>
        </div>
        ${b.erro?`<div class="flagmsg">⚠ ${b.origem==="foto"?"Leitura por foto — confira os dados antes de pagar.":"Confira este boleto — algum campo pode não ter sido lido corretamente."}</div>`:""}
      </div>`).join("");
  }
  const total=boletos.reduce((s,b)=>s+(parseFloat((b.valor||"0").replace(/\./g,"").replace(",","."))||0),0);
  $("qtd").textContent=boletos.length;
  $("total").textContent="R$ "+total.toLocaleString("pt-BR",{minimumFractionDigits:2});
  const has=boletos.length>0;
  ["xlsx","pdf","clear"].forEach(id=>$(id).disabled=!has);
}
const esc=s=>(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function copiar(i,btn){
  navigator.clipboard.writeText(barrasLimpa(boletos[i].barras)).then(()=>{
    btn.textContent="Copiado ✓";btn.classList.add("ok");toast("Código de barras copiado");
    setTimeout(()=>{btn.innerHTML="⧉ Copiar código";btn.classList.remove("ok");},1600);
  }).catch(()=>toast("Não foi possível copiar"));
}
function del(i){boletos.splice(i,1);render();toast("Boleto removido");}
$("clear").addEventListener("click",()=>{if(confirm("Apagar todos os boletos importados?")){boletos=[];render();toast("Lista limpa");}});

$("xlsx").addEventListener("click",()=>{
  const rows=boletos.map(b=>({"Beneficiário":b.nome,"Código de Barras":b.barras,"Linha (só números)":barrasLimpa(b.barras),"Vencimento":b.venc,"Valor (R$)":b.valor,"Origem":b.origem,"Arquivo":b.arquivo}));
  const ws=XLSX.utils.json_to_sheet(rows);
  ws["!cols"]=[{wch:40},{wch:42},{wch:48},{wch:12},{wch:12},{wch:8},{wch:24}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Boletos");
  XLSX.writeFile(wb,`boletos_${hoje()}.xlsx`);toast("Excel exportado");
});
